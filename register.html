<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Cozy Critters Stay</title>
  <meta
    name="description"
    content="Create your Cozy Critters Stay account to manage bookings, pet care updates, and reservation details."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet"
  >
  <script src="js/mode-bootstrap.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="image/logo.png">
  <link rel="apple-touch-icon" href="image/logo.png">
</head>
<body class="auth-page auth-page--register">

<div class="container">

  <div class="left">
    <div class="overlay">
      <h1>Create Your Cozy Critters Account</h1>
      <p>Join now to book stays faster, save your pet details, and track every update with ease.</p>

      <div class="features">
        <div>Safe pet suites</div>
        <div>Daily care updates</div>
        <div>Flexible booking</div>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="logo">
      <a href="index.html" aria-label="Go to home page">
        <img src="image/logo.png" alt="Cozy Critters Stay logo">
      </a>
    </div>

    <div class="login-box">
      <span class="welcome">JOIN WITH US</span>
      <h2>Create Your Account</h2>
      <p>Start booking your pet's next cozy stay</p>

      <form>
        <input type="text" placeholder="Full Name" autocomplete="name">
        <input type="email" placeholder="Email Address" autocomplete="email">
        <div class="password-field">
          <input type="password" placeholder="Create Password" autocomplete="new-password">
          <button class="password-toggle" type="button" aria-label="Show password" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
              <path class="password-toggle__slash" d="M4 20 20 4"></path>
            </svg>
            <span class="sr-only">Toggle password visibility</span>
          </button>
        </div>
        <div class="password-field">
          <input type="password" placeholder="Confirm Password" autocomplete="new-password">
          <button class="password-toggle" type="button" aria-label="Show password" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
              <path class="password-toggle__slash" d="M4 20 20 4"></path>
            </svg>
            <span class="sr-only">Toggle password visibility</span>
          </button>
        </div>

        <div class="options">
          <label class="remember-option">
            <input type="checkbox">
            <span>I agree to the terms</span>
          </label>
        </div>

        <button type="submit">Register</button>
        <p class="auth-switch">Already have an account? <a href="login.html">Login now</a></p>
      </form>

      <div class="auth-social">
        <p>Follow us</p>
        <div class="auth-social__links">
          <a href="#" aria-label="Facebook">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14 8h3V4h-3c-2.8 0-5 2.2-5 5v3H6v4h3v4h4v-4h3l1-4h-4V9c0-.6.4-1 1-1Z"/>
            </svg>
          </a>
          <a href="#" aria-label="Instagram">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="5"/>
              <circle cx="12" cy="12" r="4"/>
              <circle cx="17.5" cy="6.5" r="1"/>
            </svg>
          </a>
          <a href="#" aria-label="Apple">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" stroke="none" d="M15.1 3.8c.9-1 1.5-2.3 1.4-3.8-1.3.1-2.7.9-3.6 1.9-.8.9-1.5 2.2-1.3 3.5 1.4.1 2.7-.7 3.5-1.6Zm4.4 12.8c-.5 1.1-.8 1.5-1.5 2.5-1 1.4-2.3 3.2-3.9 3.2-1.4 0-1.8-.9-3.6-.9s-2.2.9-3.6.9c-1.6 0-2.8-1.6-3.8-3-2.7-3.9-3-8.5-1.3-11.2 1.2-1.9 3.1-3 4.9-3 1.8 0 2.9 1 4.4 1 1.4 0 2.2-1 4.3-1 .5 0 2.5.1 3.8 1.9-3.3 1.8-2.8 6.6.3 8.6Z"/>
            </svg>
          </a>
          <a href="#" aria-label="WhatsApp">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20.5 11.5a8.5 8.5 0 0 1-12.6 7.4L4 20l1.2-3.7A8.5 8.5 0 1 1 20.5 11.5Z"></path>
              <path d="M9.6 8.9c.2-.4.3-.5.6-.5h.5c.2 0 .4.1.5.3l.8 1.9c.1.2.1.4 0 .5l-.4.7c-.1.2-.1.3 0 .5.3.6 1 1.4 2 2 .2.1.4.1.5 0l.7-.4c.2-.1.4-.1.5 0l1.8.8c.3.1.4.3.4.5v.5c0 .3-.1.5-.4.7-.4.2-.9.3-1.5.2-.7-.1-1.6-.5-2.6-1.2-1.7-1.2-3-2.8-3.4-4.3-.3-.8-.2-1.4 0-1.9Z"></path>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>

</div>

  <script src="js/auth-password-toggle.js"></script>
  <script src="js/header-modes.js"></script>
</body>
</html>
